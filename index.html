<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio Home</title>
  <style>
    :root {
      --ink: #111820;
      --muted: #3f505b;
      --line: #bfd3dc;
      --paper: #f4fbff;
      --panel: #f8fbfd;
      --section-panel: #dbe8ee;
      --navy: #0b3155;
      --blue: #2f86bf;
      --green: #70b866;
      --sun: #f4d35e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      background:
        linear-gradient(rgba(8, 36, 63, 0.86), rgba(8, 36, 63, 0.86)),
        url("assets/gitty-back-staggered.webp") repeat,
        var(--navy);
      background-size: auto, 720px 720px, auto;
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 320px);
      gap: 28px;
      align-items: start;
      min-height: 72vh;
      padding-top: 12vh;
    }

    .hero > div {
      padding: 28px;
      background: transparent;
    }

    .clock {
      margin: 0 0 14px;
      color: rgba(248, 251, 253, 0.86);
      font-family: "Consolas", "SFMono-Regular", "Roboto Mono", monospace;
      font-size: clamp(1rem, 3vw, 1.35rem);
      letter-spacing: 0.08em;
      text-align: right;
      width: min(100%, 640px);
    }

    .hero .logo {
      display: block;
      width: min(100%, 640px);
      height: auto;
      aspect-ratio: auto;
      object-fit: contain;
      opacity: 0.5;
      border: 1px solid rgba(191, 211, 220, 0.5);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.2);
    }

    h1 {
      margin: 0;
      color: #f8fbfd;
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .lead {
      max-width: 34rem;
      margin: 20px 0 0;
      color: rgba(248, 251, 253, 0.78);
      font-size: 1.05rem;
    }

    .hero img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border: 1px solid rgba(216, 232, 236, 0.9);
      border-radius: 8px;
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.28);
    }

    .contents {
      padding: 28px;
      background: var(--section-panel);
      border: 1px solid rgba(191, 211, 220, 0.9);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.18);
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1rem;
      color: var(--navy);
      font-weight: 700;
      text-transform: uppercase;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .links a {
      display: block;
      min-height: 86px;
      padding: 18px;
      color: inherit;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .links a:hover,
    .links a:focus-visible {
      border-color: rgba(59, 167, 217, 0.7);
      box-shadow: 0 10px 26px rgba(59, 167, 217, 0.12);
      transform: translateY(-2px);
      outline: none;
    }

    .label {
      display: block;
      font-weight: 700;
    }

    .note {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    footer {
      margin-top: 32px;
      color: rgba(244, 251, 255, 0.82);
      font-size: 0.9rem;
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 24px, 560px);
        padding-top: 28px;
      }

      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
        padding-top: 0;
        margin-bottom: 44px;
      }

      .hero > div,
      .contents {
        padding: 22px;
      }

      .hero img {
        max-height: 360px;
      }

      .hero .logo {
        max-height: none;
      }

      .links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="site-title">
      <div>
        <p class="clock" id="clock" aria-label="Current date and time">----/--/-- --:--:--</p>
        <img class="logo" id="site-title" src="assets/logo-studio-web.jpg" alt="Studio Home - A simple public entry point for notes, samples, and related contents.">
      </div>
      <img id="hero-image" src="assets/nft-hero-01.webp" alt="Rotating studio image">
    </section>

    <section class="contents" aria-labelledby="contents-title">
      <h2 id="contents-title">Contents</h2>
      <ul class="links">
        <li>
          <a href="appendix/">
            <span class="label">Appendix / 付録</span>
            <span class="note">Reference notes and supporting material.</span>
          </a>
        </li>
        <li>
          <a href="abeshi-shimbun/">
            <span class="label">阿部氏ニュース</span>
            <span class="note">News-style experimental content.</span>
          </a>
        </li>
        <li>
          <a href="https://a-so-fun.webnode.jp/">
            <span class="label">Web site (Webnode)</span>
            <span class="note">External website.</span>
          </a>
        </li>
        <li>
          <a href="System_Sample/">
            <span class="label">システムサンプル（汎用）</span>
            <span class="note">General system sample.</span>
          </a>
        </li>
      </ul>
    </section>

    <footer>
      Last updated: 2026-05
    </footer>
  </main>
  <script>
    const clock = document.getElementById("clock");
    const heroImage = document.getElementById("hero-image");
    const heroImages = [
      "assets/nft-hero-01.webp",
      "assets/gitty-hero-01.webp",
      "assets/nft-hero-02.webp",
      "assets/gitty-hero-02.webp",
      "assets/nft-hero-03.webp",
      "assets/gitty-hero-03.webp",
      "assets/nft-hero-04.webp",
      "assets/gitty-hero-04.webp",
      "assets/nft-hero-05.webp",
      "assets/gitty-hero-05.webp",
      "assets/nft-hero-06.webp",
      "assets/gitty-hero-06.webp"
    ];

    function updateHeroImage() {
      const index = new Date().getHours() % heroImages.length;
      heroImage.src = heroImages[index];
    }

    function updateClock() {
      const now = new Date();
      const date = now.toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });
      const time = now.toLocaleTimeString("ja-JP", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
      clock.textContent = `${date} ${time}`;
    }

    updateHeroImage();
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(updateHeroImage, 60000);
  </script>
</body>
</html>
