<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABESHI-SHIMBUN | Studio Home</title>
  <style>
    :root {
      --ink: #101820;
      --paper: #f5fbff;
      --navy: #0b3155;
      --panel-dark: rgba(8, 34, 60, 0.76);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      background:
        linear-gradient(rgba(8, 36, 63, 0.86), rgba(8, 36, 63, 0.86)),
        url("../assets/gitty-back-staggered.webp") repeat,
        var(--navy);
      background-size: auto, 720px 720px, auto;
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 64px;
    }

    nav {
      margin-bottom: 28px;
    }

    nav a {
      color: rgba(245, 251, 255, 0.88);
      text-decoration: none;
      font-weight: 700;
    }

    header {
      max-width: 680px;
      margin-bottom: 30px;
      color: var(--paper);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .lead {
      margin: 18px 0 0;
      color: rgba(245, 251, 255, 0.78);
      font-size: 1.05rem;
    }

    .link-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .link-list a {
      display: block;
      min-height: 120px;
      padding: 20px;
      color: #d7e5ec;
      text-decoration: none;
      background: var(--panel-dark);
      border: 1px solid rgba(208, 220, 230, 0.24);
      border-radius: 8px;
      transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .link-list a:hover,
    .link-list a:focus-visible {
      border-color: rgba(245, 251, 255, 0.62);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.2);
      transform: translateY(-2px);
      outline: none;
    }

    .label {
      display: block;
      color: #f5fbff;
      font-size: 1.12rem;
      font-weight: 800;
    }

    .note {
      display: block;
      margin-top: 8px;
      color: #aebfca;
      font-size: 0.95rem;
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 24px, 560px);
        padding-top: 30px;
      }

      .link-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <nav><a href="../">Studio Home</a></nav>
    <header>
      <h1>ABESHI-SHIMBUN</h1>
      <p class="lead">News-style experimental content.</p>
    </header>

    <ul class="link-list">
      <li>
        <a href="abeSHI_NEWS00rev2.pdf">
          <span class="label">No00</span>
          <span class="note">PDF issue archive.</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
